name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Extract zip
        run: unzip halallearn_fixed.zip -d extracted

      - name: Install dependencies
        run: cd extracted/project && npm install

      - name: Build
        run: cd extracted/project && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: extracted/project/dist
