name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Extract zip
        run: unzip halallearn_fixed.zip -d newproject && mv newproject/newproject/* newproject/ 2>/dev/null || true

      - name: Commit extracted files
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add newproject/
          git commit -m "Extract project files" || echo "Nothing to commit"
          git push
