name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Extract zip
        run: unzip halallearn_fixed.zip -d extracted
      - name: Install dependencies
        run: cd extracted/project && npm install
      - name: Build
        run: cd extracted/project && npm run build
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: extracted/project/dist
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: nfp_XjhoC6jLhofJemz4mVNwYEmZHpna5EKM5d94
          NETLIFY_SITE_ID: d9e7b6e5-51a6-4fec-a41d-e878f1f2aff5
